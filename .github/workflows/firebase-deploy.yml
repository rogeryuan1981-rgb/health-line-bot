name: 部署 Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 部署至 Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
        env:
          # 使用我們剛才設定的服務帳號金鑰
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
