name: 部署 Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 升級到最新版以符合 2026 規範

      - name: 在 GitHub 環境編譯程式碼
        # 設定 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true 來消滅那個黃色警告
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          cd functions
          npm install
          npm run build

      - name: 部署至 Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
